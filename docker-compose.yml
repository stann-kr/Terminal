services:
  web:
    build: .
    container_name: terminal-web
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - WATCHPACK_POLLING=true
    env_file:
      - .env
    working_dir: /app

  supabase:
    image: node:18-alpine
    container_name: terminal-supabase-cli
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - SUPABASE_ACCESS_TOKEN=${SUPABASE_ACCESS_TOKEN:-}
